name: "CI"

# This workflow is the entrypoint for pull request validation.
# It selects the correct event path for same-repo vs fork PRs,
# then forwards the branch SHA and explicit secrets to the reusable workflow.

permissions:
  actions: read
  contents: read
  pull-requests: write
concurrency:
  group: ${{github.workflow}}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  # PRs from branches in this repository
  pull_request:
    branches:
      - main
  # PRs from forked repositories
  pull_request_target:
    branches:
      - main

jobs:
  pr_jobs:
    name: "Pipeline"
    # Only run pull_request for same-repo PRs, and pull_request_target for fork PRs.
    # This prevents duplicate workflow runs and keeps fork secret handling safe.
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'gitlabform/gitlabform') || (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != 'gitlabform/gitlabform') }}
    uses: ./.github/workflows/pr-ci-workflow.yml
    permissions:
      actions: read
      contents: read
      packages: read
      pull-requests: write
      security-events: write
    with:
      BRANCH_REF: ${{ github.event.pull_request.head.sha }}
    secrets: inherit