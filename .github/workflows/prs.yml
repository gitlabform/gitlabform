name: Linter and tests (PRs)

permissions:
  actions: read
  contents: read
  pull-requests: write
concurrency:
  group: ${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true
# On Forks only run jobs using pull_request_target -> so that they can pick up Secrets from main repository
# On main repo run jobs using pull_request -> so that we can test CI changes (only maintainers can make branches on main repo)
on:
  pull_request_target:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  approve:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    runs-on: ubuntu-latest
    steps:
      - name: Approve
        run: echo For security reasons, all pull requests need to be approved first before running the Premium Acceptance Tests.

  build-docs:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      branch_ref: ${{ github.event.pull_request.head.sha }}

  linters:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    uses: ./.github/workflows/linters.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      branch_ref: ${{ github.event.pull_request.head.sha }}

  tests-standard:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    uses: ./.github/workflows/tests-standard.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      branch_ref: ${{ github.event.pull_request.head.sha }}

  # you cannot use reusable workflows with an "environment" key,
  # so we have to copy "tests-premium.yml" here :(
  acceptance-tests-premium:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    runs-on: ubuntu-latest
    needs: [ approve ] # Require the first step to finish
    environment:
      name: Integrate Pull Request # Our dummy environment
    strategy:
      max-parallel: 5
      matrix:
        python-version: [3.14]
      fail-fast : false
    steps:
      - name: Checkout code from the PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          pip install wheel
          pip install -e .[test]
      - name: Start GitLab Premium in Docker
        env:
          GITLAB_EE_LICENSE: ${{ secrets.GITLAB_EE_LICENSE }}
        run: ./dev/run_gitlab_in_docker.sh
      - name: Run acceptance tests that require premium license
        run: pytest --cov=. --cov-report=xml --durations=0 --reruns 3 --reruns-delay 10 --log-cli-level=WARNING tests/acceptance/premium
      - name: Upload coverage to Codecov
        uses: Wandalen/wretry.action@v3
        with:
          action: codecov/codecov-action@v3
          with: |
            name: codecov-acceptance-test-premium
            flags: integration
            fail_ci_if_error: true
            override_pr: ${{ github.event.number }}
            override_commit: ${{ github.event.pull_request.head.sha }}
            token: 3e6d6cb5-fcdb-41ea-b134-f6c5856363e9
          attempt_limit: 5
          attempt_delay: 10000

  # you cannot use reusable workflows with an "environment" key,
  # so we have to copy "tests-ultimate.yml" here :(
  acceptance-tests-ultimate:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    runs-on: ubuntu-latest
    needs: [ approve ] # Require the first step to finish
    environment:
      name: Integrate Pull Request # Our dummy environment
    strategy:
      max-parallel: 5
      matrix:
        python-version: [3.14]
      fail-fast : false
    steps:
      - name: Checkout code from the PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          pip install wheel
          pip install -e .[test]
      - name: Start GitLab Ultimate in Docker
        env:
          # requested via: https://handbook.gitlab.com/handbook/marketing/developer-relations/contributor-success/community-contributors-workflows/#contributing-to-the-gitlab-enterprise-edition-ee
          # https://gitlab.com/gitlab-org/developer-relations/contributor-success/team-task/-/issues
          GITLAB_EE_LICENSE: ${{ secrets.GITLAB_EE_ULTIMATE_LICENSE }}
        run: ./dev/run_gitlab_in_docker.sh
      - name: Run acceptance tests that require Ultimate license
        run: pytest --durations=0 --reruns 3 --reruns-delay 10 --log-cli-level=WARNING tests/acceptance/ultimate
      - name: Upload coverage to Codecov
        uses: Wandalen/wretry.action@v3
        with:
          action: codecov/codecov-action@v3
          with: |
            name: codecov-acceptance-test-ultimate
            flags: integration
            override_pr: ${{ github.event.number }}
            override_commit: ${{ github.event.pull_request.head.sha }}
            token: 3e6d6cb5-fcdb-41ea-b134-f6c5856363e9
          attempt_limit: 5
          attempt_delay: 10000

  analyze:
    if: ${{ (github.event_name == 'pull_request_target' && github.repository != 'gitlabform/gitlabform') || (github.event_name == 'pull_request' && github.repository == 'gitlabform/gitlabform') }}
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: python
          build-mode: none
        - language: ruby
          build-mode: none
        # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    # Add any setup steps before running the `github/codeql-action/init` action.
    # This includes steps like installing compilers or runtimes (`actions/setup-node`
    # or others). This is typically only required for manual builds.
    # - name: Setup runtime (example)
    #   uses: actions/setup-example@v1

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    # If the analyze step fails for one of the languages you are analyzing with
    # "We were unable to automatically build your code", modify the matrix above
    # to set the build mode to "manual" for that language. Then modify this step
    # to build your code.
    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
