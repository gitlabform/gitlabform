name: Build and package artifacts

on:
  workflow_call:
    inputs:
      BRANCH_REF:
        type: string
        required: true

permissions:
  contents: read

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF }}
          fetch-depth: 2
      - name: Configure uv environment
        uses: ./.github/actions/setup-uv-local
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen --no-dev --group release
      - name: Build and verify the package
        run: |
          uv run --no-sync package build
          uv run --no-sync package verify
      - name: Upload package distribution
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/*

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF }}
          fetch-depth: 2
      - name: Configure uv environment
        uses: ./.github/actions/setup-uv-local
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen --no-dev --group docs
      - name: Build documentation
        run: uv run --no-sync docs build
      - name: Upload docs site
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site

  smoke-tests:
    name: "Smoke test - (${{ matrix.os == 'ubuntu-latest' && 'Linux' || matrix.os == 'macos-latest' && 'macOS' || 'Windows' }}, ${{ matrix.python-version }})"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14", "3.12"]
    needs: package
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF }}
          fetch-depth: 2
      - name: Configure uv environment
        uses: ./.github/actions/setup-uv-local
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen --no-dev --group test
      - name: Run smoke tests
        run: uv run --no-sync gitlabform -V
