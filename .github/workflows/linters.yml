name: Linters

on:
  workflow_call:
    inputs:
      BRANCH_REF:
        type: string
        required: true

jobs:
  black-formatting:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: 3.14
      UV_VERSION: 0.11.7
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF }}
          fetch-depth: 2
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/${UV_VERSION}/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup Python ${{ env.UV_PYTHON }} and install dependencies
        run: |
          uv sync --frozen --no-dev --group lint
      - name: Run black formatting check
        run: |
          uv run --no-sync qa lint black --check .

  types:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        python-version: [3.14]
      fail-fast: false
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      UV_VERSION: 0.11.7
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF }}
          fetch-depth: 2
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/${UV_VERSION}/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup Python ${{ matrix.python-version }} and install dependencies
        run: |
          uv sync --frozen --no-dev --group lint
      - name: Run mypy
        run: |
          uv run --no-sync qa lint mypy .

  bandit:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: 3.14
      UV_VERSION: 0.11.7
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF }}
          fetch-depth: 2
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/${UV_VERSION}/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup Python ${{ env.UV_PYTHON }} and install dependencies
        run: |
          uv sync --frozen --no-dev --group lint
      - name: Run bandit
        run: |
          uv run --no-sync qa lint bandit .
